name: generate monkeytype readme svg

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  download-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Download SVG
        run: |
          mkdir public
          curl -o public/monkeytype.svg https://monkeytype-readme.com/generate-svg/YOUR_MONKEYTYPE_USERNAME/dark

      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: monkeytype-readme
          build_dir: public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
